<!doctype html>
<html lang="en">
  <head>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary SEO -->
    <title>From Vibe Coding to Founder AgentOps | Tech Swamy Workshop</title>
    <meta
      name="description"
      content="A practical online workshop for non-technical founders to use AI coding agents like Claude Code, Codex, Gemini, and Cursor with better specs, issues, context, and workflows."

    <link rel="canonical" href="https://techswamy.com/founder-agentops" />

    <!-- Open Graph -->

    <!-- TODO: export /public/og.svg to a 1200x630 PNG and point og:image / twitter:image at /og.png -->

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="From Vibe Coding to Founder AgentOps" />

      name="twitter:description"
      content="Learn how non-technical founders can use AI agents to turn ideas into clearer specs, better prototypes, and more organised product execution."
    />
    <meta name="twitter:image" content="/og.svg" />

    <!-- Fonts: Geist (sans) + Geist Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"

    <!-- Structured data: workshop as an Event (registration coming soon) -->
    <script type="application/ld+json">

          "url": "https://techswamy.com"

        "performer": {
          "@type": "Person",
          "name": "Vijay Rangan",
